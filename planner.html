<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Planner CRM | Sarnetsky Consulting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       Planner CRM — GoodNotes-style weekly view
       ============================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --paper: #fffdf8;
      --paper-line: #e5e0d6;
      --paper-line-light: #eeebe4;
      --ink: #1a1a1a;
      --ink-light: #555;
      --accent: #2d6a4f;
      --accent-light: #d8f3dc;
      --gold: #b8960c;
      --gold-light: #fdf6e3;
      --red: #c0392b;
      --blue: #2563eb;
      --sidebar-w: 320px;
      --font: 'Manrope', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
      --font-ink: 'Caveat', cursive;
      --mono: 'IBM Plex Mono', monospace;
      --radius: 8px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      display: flex;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================
       Sidebar — Clients + Pricing
       ============================================ */
    .sidebar {
      width: var(--sidebar-w);
      background: #fff;
      border-right: 1px solid #e0ddd6;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #e0ddd6;
    }

    .sidebar-header h1 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 2px;
    }

    .sidebar-header .subtitle {
      font-size: 0.72rem;
      color: var(--ink-light);
    }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid #e0ddd6;
    }

    .sidebar-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--ink-light);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .sidebar-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* Client list */
    .client-list { list-style: none; }

    .client-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }
    .client-item:hover { background: var(--bg); }
    .client-item.active { background: var(--accent-light); }

    .client-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .client-info { flex: 1; min-width: 0; }
    .client-name {
      font-weight: 600;
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .client-tier {
      font-size: 0.7rem;
      color: var(--ink-light);
      font-family: var(--mono);
    }

    .add-client-btn {
      width: 100%;
      padding: 10px;
      border: 1.5px dashed var(--paper-line);
      border-radius: var(--radius);
      background: none;
      color: var(--ink-light);
      font-family: var(--font);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .add-client-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Pricing tab */
    .pricing-tier {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
    }
    .pricing-tier h4 {
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .pricing-tier .price {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
    }
    .pricing-tier .price-note {
      font-size: 0.72rem;
      color: var(--ink-light);
      margin-top: 4px;
      line-height: 1.5;
    }

    /* Notes tab */
    .client-detail-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .client-detail-header .client-avatar { width: 40px; height: 40px; font-size: 0.9rem; }
    .client-detail-header h3 { font-family: var(--font-display); font-size: 1rem; }
    .client-detail-header .tier-badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      background: var(--accent-light);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 100px;
      font-weight: 600;
    }

    .notes-area {
      width: 100%;
      min-height: 200px;
      border: 1px solid var(--paper-line);
      border-radius: var(--radius);
      padding: 12px;
      font-family: var(--font-ink);
      font-size: 1.1rem;
      line-height: 1.6;
      color: var(--ink);
      background: var(--paper);
      resize: vertical;
    }
    .notes-area:focus { outline: none; border-color: var(--accent); }

    .field-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--ink-light);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
      margin-top: 12px;
    }

    .field-input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--paper-line);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 0.85rem;
      background: var(--paper);
    }
    .field-input:focus { outline: none; border-color: var(--accent); }

    select.field-input {
      appearance: auto;
    }

    /* ============================================
       Main — Planner spread
       ============================================ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #fff;
      border-bottom: 1px solid #e0ddd6;
      flex-shrink: 0;
    }

    .toolbar-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar-btn {
      background: none;
      border: 1px solid var(--paper-line);
      border-radius: var(--radius);
      padding: 6px 14px;
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--ink);
      transition: all 0.15s;
    }
    .toolbar-btn:hover { border-color: var(--accent); color: var(--accent); }

    .toolbar-week {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
    }

    .toolbar-today {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .toolbar-today:hover { background: var(--accent); color: #fff; opacity: 0.9; }

    /* Planner grid */
    .planner-scroll {
      flex: 1;
      overflow: auto;
      padding: 24px;
    }

    .planner {
      background: var(--paper);
      border: 1px solid var(--paper-line);
      border-radius: var(--radius);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      min-width: 700px;
      display: grid;
      grid-template-columns: 56px repeat(7, 1fr);
      position: relative;
    }

    /* Header row */
    .planner-day-header {
      padding: 12px 8px;
      text-align: center;
      border-bottom: 2px solid var(--paper-line);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--ink-light);
      position: sticky;
      top: 0;
      background: var(--paper);
      z-index: 2;
    }
    .planner-day-header.today {
      color: var(--accent);
      background: var(--accent-light);
    }
    .planner-day-header .day-num {
      display: block;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
    }
    .planner-day-header.today .day-num { color: var(--accent); }

    .planner-time-header {
      padding: 12px 8px;
      border-bottom: 2px solid var(--paper-line);
      position: sticky;
      top: 0;
      background: var(--paper);
      z-index: 2;
    }

    /* Time column */
    .planner-time {
      padding: 2px 8px 0;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--ink-light);
      text-align: right;
      border-right: 1px solid var(--paper-line);
      border-bottom: 1px solid var(--paper-line-light);
      height: 48px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
    }

    /* Time slots */
    .planner-slot {
      height: 48px;
      border-bottom: 1px solid var(--paper-line-light);
      border-right: 1px solid var(--paper-line-light);
      position: relative;
      cursor: text;
      transition: background 0.1s;
    }
    .planner-slot:hover { background: rgba(45, 106, 79, 0.03); }
    .planner-slot:last-child { border-right: none; }

    /* Hour marks */
    .planner-slot.hour-mark {
      border-bottom-color: var(--paper-line);
    }

    /* Entries on the planner */
    .planner-entry {
      position: absolute;
      left: 2px;
      right: 2px;
      background: var(--accent-light);
      border-left: 3px solid var(--accent);
      border-radius: 0 4px 4px 0;
      padding: 3px 6px;
      font-family: var(--font-ink);
      font-size: 0.95rem;
      color: var(--accent);
      overflow: hidden;
      cursor: pointer;
      z-index: 1;
      line-height: 1.3;
    }

    .planner-entry.tier-sprint {
      background: var(--gold-light);
      border-left-color: var(--gold);
      color: #8a6d00;
    }

    .planner-entry.tier-build {
      background: #e8e4f8;
      border-left-color: var(--blue);
      color: var(--blue);
    }

    .planner-entry .entry-time {
      font-family: var(--mono);
      font-size: 0.6rem;
      opacity: 0.7;
    }

    /* Focus / To-do sidebar on planner */
    .planner-sidebar-col {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-top: 2px solid var(--paper-line);
      min-height: 120px;
    }

    .planner-sidebar-block {
      padding: 12px;
      border-right: 1px solid var(--paper-line-light);
    }
    .planner-sidebar-block:last-child { border-right: none; }

    .planner-sidebar-block h5 {
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--ink-light);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .planner-sidebar-block textarea {
      width: 100%;
      border: none;
      background: transparent;
      font-family: var(--font-ink);
      font-size: 1.05rem;
      color: var(--ink);
      line-height: 1.6;
      resize: none;
      min-height: 80px;
    }
    .planner-sidebar-block textarea:focus { outline: none; }

    /* ============================================
       Appointment modal
       ============================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      width: 400px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      transform: translateY(8px);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h3 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      margin-bottom: 16px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .modal-btn {
      padding: 8px 20px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--paper-line);
      background: #fff;
      color: var(--ink);
      transition: all 0.15s;
    }
    .modal-btn:hover { border-color: var(--accent); }

    .modal-btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .modal-btn-primary:hover { opacity: 0.9; }

    .modal-btn-danger {
      color: var(--red);
      border-color: transparent;
      background: none;
      margin-right: auto;
    }
    .modal-btn-danger:hover { background: #fef2f2; }

    /* ============================================
       Mobile
       ============================================ */
    .sidebar-toggle {
      display: none;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 8px 14px;
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        z-index: 50;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        box-shadow: 4px 0 20px rgba(0,0,0,0.1);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-toggle { display: block; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>Planner CRM</h1>
      <div class="subtitle">Sarnetsky Consulting</div>
    </div>
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-tab="clients">Clients</button>
      <button class="sidebar-tab" data-tab="pricing">Pricing</button>
      <button class="sidebar-tab" data-tab="notes">Notes</button>
    </div>
    <div class="sidebar-body" id="sidebar-body">
      <!-- Populated by JS -->
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="toolbar">
      <div class="toolbar-nav">
        <button class="sidebar-toggle" id="sidebar-toggle">Menu</button>
        <button class="toolbar-btn" id="prev-week">&larr;</button>
        <span class="toolbar-week" id="week-label">Mar 16 &ndash; 22, 2026</span>
        <button class="toolbar-btn" id="next-week">&rarr;</button>
      </div>
      <button class="toolbar-btn toolbar-today" id="today-btn">Today</button>
    </div>
    <div class="planner-scroll">
      <div class="planner" id="planner">
        <!-- Generated by JS -->
      </div>
    </div>
  </div>

  <!-- Appointment Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3 id="modal-title">New Appointment</h3>
      <div class="field-label">Title</div>
      <input class="field-input" id="modal-input-title" placeholder="Discovery call with...">
      <div class="field-label">Client</div>
      <select class="field-input" id="modal-input-client">
        <option value="">No client</option>
      </select>
      <div class="field-label">Time</div>
      <div style="display:flex; gap:8px;">
        <select class="field-input" id="modal-input-start" style="flex:1;"></select>
        <select class="field-input" id="modal-input-end" style="flex:1;"></select>
      </div>
      <div class="field-label">Colour</div>
      <select class="field-input" id="modal-input-color">
        <option value="default">Green (default)</option>
        <option value="tier-sprint">Gold (sprint)</option>
        <option value="tier-build">Blue (build)</option>
      </select>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-danger" id="modal-delete" style="display:none;">Delete</button>
        <button class="modal-btn" id="modal-cancel">Cancel</button>
        <button class="modal-btn modal-btn-primary" id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    // ============================================
    // Data store (localStorage)
    // ============================================
    var STORE_KEY = 'sarnetsky-planner-crm';

    function loadData() {
      try {
        var raw = localStorage.getItem(STORE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) { return null; }
    }

    function saveData() {
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
    }

    var defaults = {
      clients: [
        { id: 1, name: 'Example Client', email: 'hello@example.com', tier: 'power', notes: 'Met at a networking event. Runs a Shopify store doing ~$400K/yr. Interested in SEO automation.' },
      ],
      appointments: [
        { id: 1, clientId: 1, title: 'Discovery Call', date: getTodayStr(), startHour: 10, endHour: 10.5, color: 'default' }
      ],
      weekNotes: {},
      nextClientId: 2,
      nextApptId: 2
    };

    function getTodayStr() {
      var d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    var data = loadData() || JSON.parse(JSON.stringify(defaults));
    if (!data.weekNotes) data.weekNotes = {};

    // ============================================
    // Week state
    // ============================================
    var currentWeekStart = getWeekStart(new Date());

    function getWeekStart(date) {
      var d = new Date(date);
      var day = d.getDay();
      var diff = d.getDate() - day + (day === 0 ? -6 : 1); // Monday
      d.setDate(diff);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function dateStr(d) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function formatDate(d) {
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[d.getMonth()] + ' ' + d.getDate();
    }

    function getWeekDays() {
      var days = [];
      for (var i = 0; i < 7; i++) {
        var d = new Date(currentWeekStart);
        d.setDate(d.getDate() + i);
        days.push(d);
      }
      return days;
    }

    var DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    var START_HOUR = 6;
    var END_HOUR = 21;

    // ============================================
    // Render planner grid
    // ============================================
    var plannerEl = document.getElementById('planner');
    var weekLabel = document.getElementById('week-label');
    var todayStr = getTodayStr();

    function renderPlanner() {
      var days = getWeekDays();
      var end = new Date(days[6]);
      weekLabel.innerHTML = formatDate(days[0]) + ' &ndash; ' + formatDate(end) + ', ' + days[0].getFullYear();

      var html = '';

      // Header row
      html += '<div class="planner-time-header"></div>';
      for (var d = 0; d < 7; d++) {
        var ds = dateStr(days[d]);
        var isToday = ds === todayStr ? ' today' : '';
        html += '<div class="planner-day-header' + isToday + '">';
        html += DAY_NAMES[d];
        html += '<span class="day-num">' + days[d].getDate() + '</span>';
        html += '</div>';
      }

      // Time rows
      for (var h = START_HOUR; h <= END_HOUR; h++) {
        for (var half = 0; half < 2; half++) {
          var hour = h + half * 0.5;
          var timeLabel = half === 0 ? (h <= 12 ? h + (h < 12 ? 'am' : 'pm') : (h - 12) + 'pm') : '';
          var hourClass = half === 0 ? ' hour-mark' : '';

          html += '<div class="planner-time' + hourClass + '">' + timeLabel + '</div>';

          for (var dd = 0; dd < 7; dd++) {
            var dds = dateStr(days[dd]);
            html += '<div class="planner-slot' + hourClass + '" data-date="' + dds + '" data-hour="' + hour + '"></div>';
          }
        }
      }

      // Focus / Intentions / To Do
      var weekKey = dateStr(days[0]);
      var wn = data.weekNotes[weekKey] || { focus: '', intentions: '', todo: '' };

      html += '<div class="planner-sidebar-col">';
      html += '<div class="planner-sidebar-block"><h5>Focus</h5><textarea data-field="focus" placeholder="What matters most this week?">' + escHtml(wn.focus) + '</textarea></div>';
      html += '<div class="planner-sidebar-block"><h5>Intentions</h5><textarea data-field="intentions" placeholder="How do you want to show up?">' + escHtml(wn.intentions) + '</textarea></div>';
      html += '<div class="planner-sidebar-block"><h5>To Do</h5><textarea data-field="todo" placeholder="Tasks for the week...">' + escHtml(wn.todo) + '</textarea></div>';
      html += '</div>';

      plannerEl.innerHTML = html;

      // Render appointments
      renderAppointments(days);

      // Bind slot clicks
      plannerEl.querySelectorAll('.planner-slot').forEach(function (slot) {
        slot.addEventListener('click', function () {
          openModal(null, slot.dataset.date, parseFloat(slot.dataset.hour));
        });
      });

      // Bind week notes
      plannerEl.querySelectorAll('.planner-sidebar-block textarea').forEach(function (ta) {
        ta.addEventListener('input', function () {
          if (!data.weekNotes[weekKey]) data.weekNotes[weekKey] = { focus: '', intentions: '', todo: '' };
          data.weekNotes[weekKey][ta.dataset.field] = ta.value;
          saveData();
        });
      });
    }

    function renderAppointments(days) {
      var dayStrs = days.map(dateStr);

      data.appointments.forEach(function (appt) {
        var dayIdx = dayStrs.indexOf(appt.date);
        if (dayIdx === -1) return;

        // Find the slot
        var slots = plannerEl.querySelectorAll('.planner-slot[data-date="' + appt.date + '"]');
        var startSlot = null;
        slots.forEach(function (s) {
          if (parseFloat(s.dataset.hour) === appt.startHour) startSlot = s;
        });
        if (!startSlot) return;

        var duration = (appt.endHour - appt.startHour) * 2; // in half-hours
        var height = duration * 48;

        var el = document.createElement('div');
        el.className = 'planner-entry' + (appt.color && appt.color !== 'default' ? ' ' + appt.color : '');
        el.style.top = '0';
        el.style.height = height + 'px';
        el.innerHTML = '<div class="entry-time">' + formatHour(appt.startHour) + '</div>' + escHtml(appt.title);

        el.addEventListener('click', function (e) {
          e.stopPropagation();
          openModal(appt);
        });

        startSlot.style.position = 'relative';
        startSlot.appendChild(el);
      });
    }

    function formatHour(h) {
      var hr = Math.floor(h);
      var min = h % 1 === 0.5 ? '30' : '00';
      var ampm = hr >= 12 ? 'pm' : 'am';
      var display = hr > 12 ? hr - 12 : (hr === 0 ? 12 : hr);
      return display + ':' + min + ampm;
    }

    function escHtml(s) {
      return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ============================================
    // Week navigation
    // ============================================
    document.getElementById('prev-week').addEventListener('click', function () {
      currentWeekStart.setDate(currentWeekStart.getDate() - 7);
      renderPlanner();
    });
    document.getElementById('next-week').addEventListener('click', function () {
      currentWeekStart.setDate(currentWeekStart.getDate() + 7);
      renderPlanner();
    });
    document.getElementById('today-btn').addEventListener('click', function () {
      currentWeekStart = getWeekStart(new Date());
      renderPlanner();
    });

    // ============================================
    // Modal
    // ============================================
    var modalOverlay = document.getElementById('modal-overlay');
    var modalTitle = document.getElementById('modal-title');
    var modalInputTitle = document.getElementById('modal-input-title');
    var modalInputClient = document.getElementById('modal-input-client');
    var modalInputStart = document.getElementById('modal-input-start');
    var modalInputEnd = document.getElementById('modal-input-end');
    var modalInputColor = document.getElementById('modal-input-color');
    var modalDelete = document.getElementById('modal-delete');
    var editingAppt = null;
    var modalDate = null;

    // Populate time selects
    function populateTimeSelects() {
      var html = '';
      for (var h = START_HOUR; h <= END_HOUR; h++) {
        for (var m = 0; m < 2; m++) {
          var val = h + m * 0.5;
          html += '<option value="' + val + '">' + formatHour(val) + '</option>';
        }
      }
      modalInputStart.innerHTML = html;
      modalInputEnd.innerHTML = html;
    }
    populateTimeSelects();

    function populateClientSelect() {
      var html = '<option value="">No client</option>';
      data.clients.forEach(function (c) {
        html += '<option value="' + c.id + '">' + escHtml(c.name) + '</option>';
      });
      modalInputClient.innerHTML = html;
    }

    function openModal(appt, date, hour) {
      editingAppt = appt;
      modalDate = date || (appt && appt.date);
      populateClientSelect();

      if (appt) {
        modalTitle.textContent = 'Edit Appointment';
        modalInputTitle.value = appt.title;
        modalInputClient.value = appt.clientId || '';
        modalInputStart.value = appt.startHour;
        modalInputEnd.value = appt.endHour;
        modalInputColor.value = appt.color || 'default';
        modalDelete.style.display = '';
      } else {
        modalTitle.textContent = 'New Appointment';
        modalInputTitle.value = '';
        modalInputClient.value = '';
        modalInputStart.value = hour || 9;
        modalInputEnd.value = (hour || 9) + 0.5;
        modalInputColor.value = 'default';
        modalDelete.style.display = 'none';
      }

      modalOverlay.classList.add('open');
      modalInputTitle.focus();
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      editingAppt = null;
    }

    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', function (e) {
      if (e.target === modalOverlay) closeModal();
    });

    document.getElementById('modal-save').addEventListener('click', function () {
      var title = modalInputTitle.value.trim();
      if (!title) return;

      if (editingAppt) {
        editingAppt.title = title;
        editingAppt.clientId = modalInputClient.value ? parseInt(modalInputClient.value) : null;
        editingAppt.startHour = parseFloat(modalInputStart.value);
        editingAppt.endHour = parseFloat(modalInputEnd.value);
        editingAppt.color = modalInputColor.value;
      } else {
        data.appointments.push({
          id: data.nextApptId++,
          title: title,
          clientId: modalInputClient.value ? parseInt(modalInputClient.value) : null,
          date: modalDate,
          startHour: parseFloat(modalInputStart.value),
          endHour: parseFloat(modalInputEnd.value),
          color: modalInputColor.value
        });
      }

      saveData();
      closeModal();
      renderPlanner();
    });

    document.getElementById('modal-delete').addEventListener('click', function () {
      if (editingAppt) {
        data.appointments = data.appointments.filter(function (a) { return a.id !== editingAppt.id; });
        saveData();
        closeModal();
        renderPlanner();
      }
    });

    // ============================================
    // Sidebar
    // ============================================
    var sidebarBody = document.getElementById('sidebar-body');
    var activeTab = 'clients';
    var selectedClientId = null;

    document.querySelectorAll('.sidebar-tab').forEach(function (tab) {
      tab.addEventListener('click', function () {
        document.querySelectorAll('.sidebar-tab').forEach(function (t) { t.classList.remove('active'); });
        tab.classList.add('active');
        activeTab = tab.dataset.tab;
        renderSidebar();
      });
    });

    function renderSidebar() {
      if (activeTab === 'clients') renderClients();
      else if (activeTab === 'pricing') renderPricing();
      else if (activeTab === 'notes') renderNotes();
    }

    function getInitials(name) {
      return name.split(' ').map(function (w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
    }

    var TIERS = {
      discovery: { label: 'Discovery', price: 'Free' },
      power: { label: 'Power Session', price: '$500' },
      sprint: { label: 'Full Sprint', price: '$1,000' },
      office: { label: 'Office Hours', price: '$250/mo' },
      build: { label: 'Build for Me', price: 'Custom' }
    };

    function renderClients() {
      var html = '<ul class="client-list">';
      data.clients.forEach(function (c) {
        var tier = TIERS[c.tier] || TIERS.discovery;
        var active = c.id === selectedClientId ? ' active' : '';
        html += '<li class="client-item' + active + '" data-id="' + c.id + '">';
        html += '<div class="client-avatar">' + getInitials(c.name) + '</div>';
        html += '<div class="client-info"><div class="client-name">' + escHtml(c.name) + '</div>';
        html += '<div class="client-tier">' + tier.label + ' &middot; ' + tier.price + '</div></div>';
        html += '</li>';
      });
      html += '</ul>';
      html += '<button class="add-client-btn" id="add-client">+ Add Client</button>';

      sidebarBody.innerHTML = html;

      sidebarBody.querySelectorAll('.client-item').forEach(function (item) {
        item.addEventListener('click', function () {
          selectedClientId = parseInt(item.dataset.id);
          document.querySelectorAll('.sidebar-tab').forEach(function (t) { t.classList.remove('active'); });
          document.querySelector('[data-tab="notes"]').classList.add('active');
          activeTab = 'notes';
          renderSidebar();
        });
      });

      var addBtn = document.getElementById('add-client');
      if (addBtn) {
        addBtn.addEventListener('click', function () {
          var name = prompt('Client name:');
          if (!name) return;
          data.clients.push({
            id: data.nextClientId++,
            name: name,
            email: '',
            tier: 'discovery',
            notes: ''
          });
          saveData();
          renderSidebar();
        });
      }
    }

    function renderPricing() {
      var html = '';
      var tiers = [
        { key: 'discovery', desc: 'Free 15-minute call to assess fit and identify high-impact automations.' },
        { key: 'power', desc: '2-hour hands-on session. We build one system together on your data.' },
        { key: 'sprint', desc: '2 sessions (4hrs). Connect multiple systems, build a dashboard, 2 weeks follow-up.' },
        { key: 'office', desc: 'Monthly 1-hour check-in. Troubleshoot, extend, and build new automations.' },
        { key: 'build', desc: 'I handle it end-to-end. Scoped per project after discovery call.' }
      ];

      tiers.forEach(function (t) {
        var tier = TIERS[t.key];
        html += '<div class="pricing-tier">';
        html += '<h4>' + tier.label + '</h4>';
        html += '<div class="price">' + tier.price + '</div>';
        html += '<div class="price-note">' + t.desc + '</div>';
        html += '</div>';
      });

      sidebarBody.innerHTML = html;
    }

    function renderNotes() {
      var client = data.clients.find(function (c) { return c.id === selectedClientId; });

      if (!client) {
        sidebarBody.innerHTML = '<p style="color: var(--ink-light); font-size: 0.85rem; padding: 20px 0;">Select a client to view notes.</p>';
        return;
      }

      var tier = TIERS[client.tier] || TIERS.discovery;

      var html = '<div class="client-detail-header">';
      html += '<div class="client-avatar">' + getInitials(client.name) + '</div>';
      html += '<div><h3>' + escHtml(client.name) + '</h3>';
      html += '<span class="tier-badge">' + tier.label + ' &middot; ' + tier.price + '</span></div>';
      html += '</div>';

      html += '<div class="field-label">Email</div>';
      html += '<input class="field-input" id="client-email" value="' + escHtml(client.email) + '" placeholder="email@example.com">';

      html += '<div class="field-label">Tier</div>';
      html += '<select class="field-input" id="client-tier">';
      Object.keys(TIERS).forEach(function (k) {
        var sel = k === client.tier ? ' selected' : '';
        html += '<option value="' + k + '"' + sel + '>' + TIERS[k].label + ' (' + TIERS[k].price + ')</option>';
      });
      html += '</select>';

      html += '<div class="field-label">Notes</div>';
      html += '<textarea class="notes-area" id="client-notes" placeholder="Write notes here...">' + escHtml(client.notes) + '</textarea>';

      sidebarBody.innerHTML = html;

      // Bind changes
      document.getElementById('client-email').addEventListener('input', function () {
        client.email = this.value;
        saveData();
      });
      document.getElementById('client-tier').addEventListener('change', function () {
        client.tier = this.value;
        saveData();
      });
      document.getElementById('client-notes').addEventListener('input', function () {
        client.notes = this.value;
        saveData();
      });
    }

    // Mobile sidebar toggle
    var sidebarEl = document.getElementById('sidebar');
    document.getElementById('sidebar-toggle').addEventListener('click', function () {
      sidebarEl.classList.toggle('open');
    });

    // ============================================
    // Init
    // ============================================
    renderPlanner();
    renderSidebar();

  })();
  </script>
</body>
</html>
